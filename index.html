<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>山城市</title>

<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="icon" sizes="512x512" href="icon-512.png">

<style>
/* ===== 基本 ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:#f2f4f8;
  color:#111;
}
.hidden{display:none}

/* ===== PC非対応 ===== */
@media (min-width:768px){
  body *{display:none}
  body::before{
    content:"このアプリはスマートフォン専用です";
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:center;
    font-size:18px;
  }
}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  z-index:999;
}
#splash h1{
  font-size:42px;
  background:linear-gradient(90deg,#007aff,#5ac8fa);
  -webkit-background-clip:text;
  color:transparent;
  animation:zoom 1.8s ease forwards;
}
@keyframes zoom{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1.6);opacity:1}
}

/* ===== ブラウザ案内 ===== */
#install{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:24px;
  background:#fff;
}

/* ===== アプリ ===== */
main{padding:20px 16px 120px}
.tab{display:none}
.tab.active{display:block}

/* ===== ガラスカード ===== */
.card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(18px);
  border-radius:22px;
  padding:18px;
  margin-bottom:18px;
}

/* ===== ヒーロー ===== */
.hero{
  background:linear-gradient(135deg,#007aff,#5ac8fa);
  color:#fff;
  border-radius:26px;
  padding:28px;
}
.time{
  font-size:34px;
  margin-top:8px;
  font-weight:600;
}

/* ===== タブバー（ANA風） ===== */
nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:94px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  display:flex;
  box-shadow:0 -6px 20px rgba(0,0,0,0.1);
}
nav button{
  flex:1;
  border:none;
  background:none;
  font-size:11px;
  color:#777;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
nav button.active{
  color:#007aff;
  font-weight:600;
}

/* ===== 入力 ===== */
input{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background:#eef1f6;
}
.main{
  width:100%;
  padding:16px;
  border:none;
  border-radius:18px;
  background:#007aff;
  color:#fff;
}
iframe{
  width:100%;
  height:70vh;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="splash"><h1>山城市</h1></div>

<div id="install" class="hidden">
  <div>
    <h2>このアプリは<br>インストールしてご利用ください</h2>
    <p>
      iPhone：共有 → ホーム画面に追加<br>
      Android：︙ → アプリをインストール
    </p>
  </div>
</div>

<main id="app" class="hidden">

<script>
const NEWS_TEXT="山城市公式アプリ β版を公開しました。";
const NEWS_UPDATED="2026-05-10 12:00";
</script>

<section id="home" class="tab active">
  <div class="hero">
    <h2>山城市へようこそ！</h2>
    <div class="time" id="time"></div>
  </div>

  <div class="card">
    <h3>山城市からのお知らせ</h3>
    <p id="news"></p>
    <small>最終更新：<span id="newsTime"></span></small>
  </div>

  <div class="card">
    <button class="main"
      onclick="location.href='https://sites.google.com/view/yamashiro-city'">
      山城市ホームページへ
    </button>
  </div>
</section>

<section id="login" class="tab">
  <div class="card">
    <h3>ログイン</h3>
    <input id="pw" placeholder="パスワード">
    <br><br>
    <button class="main" onclick="login()">ログイン</button>
  </div>
</section>

<section id="pay" class="tab">
  <div class="card">
    <h3>ヤマPay</h3>
    <p>現在準備中です。公開をお楽しみに！</p>
  </div>
</section>

<section id="setting" class="tab">
  <div class="card">
    <h3>設定</h3>
    <button onclick="document.body.classList.toggle('dark')">ダークモード</button>
    <p>通知：<button onclick="Notification.requestPermission()">許可</button></p>
    <p>最新バージョン：1.02</p>
  </div>
</section>

<section id="music" class="tab">
  <div class="card">
    <h3>Music</h3>
    <iframe src="https://audius.co/yuuuuuuuuuuum"></iframe>
  </div>
</section>

</main>

<nav id="nav" class="hidden">
  <button class="active" onclick="show('home',this)">ホーム</button>
  <button onclick="show('login',this)">ログイン</button>
  <button onclick="show('pay',this)">ヤマPay</button>
  <button onclick="show('setting',this)">設定</button>
  <button onclick="show('music',this)">Music</button>
</nav>

<script>
const isPWA =
  window.matchMedia('(display-mode: standalone)').matches ||
  window.navigator.standalone === true;

setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  if(!isPWA){
    document.getElementById("install").classList.remove("hidden");
  }else{
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("nav").classList.remove("hidden");
    document.getElementById("news").innerText=NEWS_TEXT;
    document.getElementById("newsTime").innerText=NEWS_UPDATED;
  }
},1800);

function show(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function login(){
  const p=document.getElementById("pw").value;
  const map={
    kaori:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
    daiki:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
    nanami:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
  };
  if(map[p])location.href=map[p];
  else alert("パスワードが違います");
}

setInterval(()=>{
  document.getElementById("time").innerText=
    new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
},1000);
</script>

</body>
</html>
