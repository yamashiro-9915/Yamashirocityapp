<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>山城市公式アプリ</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="山城市">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #1d1d1f;
            --accent-color: #007aff;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        /* --- お知らせ編集エリア --- */
        /* NEWS_CONTENT: お知らせ本文 / NEWS_UPDATE: 更新日時 */
        <script>
            const NEWS_DATA = {
                content: "山城市ベータ版アプリへようこそ！本日より公開開始です。",
                updatedAt: "2026/05/10 18:00"
            };
        </script>
        /* ----------------------- */

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background: linear-gradient(160deg, #e0eafc 0%, #cfdef3 100%);
            overflow: hidden;
            color: var(--text-color);
        }

        /* グラスモーフィズム */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
        }

        /* スプラッシュ画面（ロゴ削除Ver） */
        #splash {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #ffffff;
            transition: opacity 0.6s ease-in-out;
        }

        .gradient-text {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(45deg, #2af598 0%, #009efd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ブラウザ用ガイド */
        #pwa-guide {
            display: none; position: fixed; inset: 0; z-index: 1500;
            background: white; padding: 40px 20px; text-align: center;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* メイン構造 */
        #app-shell {
            display: block; height: 100%; opacity: 0;
            transition: opacity 0.5s ease;
            padding-top: 60px;
        }

        .page {
            display: none; height: calc(100vh - 160px); overflow-y: auto;
            padding: 20px; box-sizing: border-box;
        }
        .page.active { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ナビゲーション */
        nav {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            height: 70px; display: flex; align-items: center;
            border-radius: 25px; z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .tab-item {
            flex: 1; text-align: center; font-size: 11px; color: #8e8e93;
        }
        .tab-item.active { color: var(--accent-color); font-weight: bold; }
        .tab-icon { font-size: 24px; display: block; margin-bottom: 2px; }

        /* コンポーネント */
        .card { border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn {
            background: var(--accent-color); color: white; border: none;
            padding: 15px; border-radius: 15px; width: 100%; font-size: 16px; font-weight: 600;
        }
        .time-display { font-size: 3rem; font-weight: 200; text-align: center; margin: 30px 0; letter-spacing: -1px; }

        input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
            background: rgba(255,255,255,0.8); margin-bottom: 15px; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="gradient-text">山城市</div>
    </div>

    <div id="pwa-guide">
        <h2 class="gradient-text" style="font-size: 2.5rem;">山城市</h2>
        <p>このアプリはインストールが必要です</p>
        <div style="text-align: left; background: #f8f8f8; padding: 20px; border-radius: 20px; margin: 20px 0;">
            <p><strong>iPhone:</strong> 共有ボタン <span style="font-size: 1.2rem;">⎋</span> を押し、「ホーム画面に追加」を選択</p>
            <p><strong>Android:</strong> 右上のメニューから「アプリをインストール」を選択</p>
        </div>
    </div>

    <div id="app-shell">
        <div id="home" class="page active">
            <h2 style="margin-bottom:0;">山城市へようこそ！</h2>
            <div class="time-display" id="current-time">--:--:--</div>
            
            <div class="card glass">
                <h4 style="margin:0 0 10px 0;">📢 お知らせ</h4>
                <p id="news-content" style="margin:0; line-height:1.5;"></p>
                <div style="text-align:right; margin-top:10px;">
                    <small style="opacity: 0.5;">最終更新: <span id="last-updated"></span></small>
                </div>
            </div>

            <button class="btn glass" style="background: rgba(255,255,255,0.7); color: var(--accent-color);" onclick="location.href='https://sites.google.com/view/yamashiro-city'">公式サイトをブラウザで開く</button>
        </div>

        <div id="login" class="page">
            <h2>個人ログイン</h2>
            <div class="card glass">
                <input type="password" id="pass-input" placeholder="パスワードを入力">
                <button class="btn" onclick="checkLogin()">ログイン</button>
            </div>
        </div>

        <div id="pay" class="page">
            <h2>ヤマPay</h2>
            <div class="card glass" style="text-align: center; padding: 60px 20px;">
                <div style="font-size: 60px; margin-bottom: 20px;">💳</div>
                <h3>準備中です</h3>
                <p>次回のアップデートまでお待ちください</p>
            </div>
        </div>

        <div id="settings" class="page">
            <h2>設定</h2>
            <div class="card glass">
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <span>ダークモード</span><input type="checkbox">
                </div>
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <span>通知の許可</span><input type="checkbox" checked>
                </div>
                <div style="display:flex; justify-content: space-between; margin-bottom: 20px;">
                    <span>文字サイズ</span><span>標準 ></span>
                </div>
                <hr style="opacity:0.1; margin: 15px 0;">
                <small>バージョン: 1.02 (最新版)</small>
            </div>
        </div>

        <nav class="glass">
            <div class="tab-item active" onclick="showPage('home', this)"><span class="tab-icon">🏠</span>ホーム</div>
            <div class="tab-item" onclick="showPage('login', this)"><span class="tab-icon">👤</span>ログイン</div>
            <div class="tab-item" onclick="showPage('pay', this)"><span class="tab-icon">💰</span>Pay</div>
            <div class="tab-item" onclick="showPage('settings', this)"><span class="tab-icon">⚙️</span>設定</div>
            <div class="tab-item" onclick="window.open('https://audius.co/yuuuuuuuuuuum', '_blank')"><span class="tab-icon">🎵</span>Music</div>
        </nav>
    </div>

    <script>
        // 設定データ反映
        document.getElementById('news-content').innerText = NEWS_DATA.content;
        document.getElementById('last-updated').innerText = NEWS_DATA.updatedAt;

        // PWA判定
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        function init() {
            if (!isMobile) {
                document.body.innerHTML = "スマホから開いてください";
                return;
            }

            // ブラウザならガイド表示、アプリならスプラッシュ後にメイン表示
            if (!isStandalone) {
                document.getElementById('pwa-guide').style.display = 'flex';
                document.getElementById('splash').style.display = 'none';
            } else {
                setTimeout(() => {
                    document.getElementById('splash').style.opacity = '0';
                    document.getElementById('app-shell').style.opacity = '1';
                    setTimeout(() => document.getElementById('splash').style.display = 'none', 600);
                }, 1500);
                
                // 初回通知ダイアログ
                if (!localStorage.getItem('opened')) {
                    setTimeout(() => {
                        confirm("山城市アプリからの通知を許可しますか？（毎日名言をお届けします）");
                        localStorage.setItem('opened', 'true');
                    }, 3000);
                }
            }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function checkLogin() {
            const p = document.getElementById('pass-input').value;
            const db = {
                'kaori': 'https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori',
                'daiki': 'https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki',
                'nanami': 'https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami'
            };
            if(db[p]) { location.href = db[p]; } else { alert('パスワードが正しくありません'); }
        }

        setInterval(() => {
            const n = new Date();
            document.getElementById('current-time').innerText = n.toLocaleTimeString('ja-JP');
        }, 1000);

        init();
    </script>
</body>
</html>
