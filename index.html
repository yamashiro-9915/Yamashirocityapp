<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>山城市</title>

<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<style>
/* ===== 基本 ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:#f2f5fa;
  color:#111;
}
body.dark{
  background:#0c0c0e;
  color:#fff;
}
.hidden{display:none}

/* ===== PC非対応 ===== */
@media (min-width:768px){
  body *{display:none}
  body::before{
    content:"このアプリはスマートフォン専用です";
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:center;
    font-size:18px;
  }
}

/* ===== ガラスカード ===== */
.card{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:16px;
  margin-bottom:16px;
}
body.dark .card{
  background:rgba(30,30,30,0.7);
}

/* ===== スプラッシュ ===== */
#splash{
  position:fixed;inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
  z-index:1000;
}
#splash h1{
  font-size:42px;
  background:linear-gradient(90deg,#007aff,#5ac8fa);
  -webkit-background-clip:text;
  color:transparent;
  animation:zoom 1.8s ease forwards;
}
@keyframes zoom{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1.6);opacity:1}
}

/* ===== メイン ===== */
main{
  padding:16px 16px 100px;
}
.tab{display:none}
.tab.active{display:block}

/* ===== タブバー ===== */
nav{
  position:fixed;
  bottom:0;left:0;right:0;
  height:80px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(20px);
  display:flex;
  border-top:1px solid rgba(0,0,0,0.1);
}
body.dark nav{
  background:rgba(20,20,20,0.8);
}
nav button{
  flex:1;
  border:none;
  background:none;
  font-size:11px;
  color:#666;
}
nav button.active{
  color:#007aff;
  font-weight:600;
}

/* ===== UI ===== */
h2{margin:0 0 8px}
.time{
  font-size:28px;
  font-weight:600;
}
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#e9ecf1;
  font-size:16px;
}
button.main{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background:#007aff;
  color:#fff;
  font-size:16px;
}
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
}
</style>
</head>

<body>

<div id="splash"><h1>山城市</h1></div>

<main id="app" class="hidden">

<!-- 🔔 編集しやすいお知らせ -->
<script>
const NEWS_TEXT="山城市公式アプリ ベータ版を公開しました。";
const NEWS_UPDATED="2026-05-10 12:00";
</script>

<section id="home" class="tab active">
  <div class="card">
    <h2>山城市へようこそ</h2>
    <div class="time" id="time"></div>
  </div>

  <div class="card">
    <h3>お知らせ</h3>
    <p id="news"></p>
    <small>最終更新：<span id="newsTime"></span></small>
  </div>

  <div class="card">
    <button class="main" onclick="location.href='https://sites.google.com/view/yamashiro-city'">
      山城市ホームページへ
    </button>
  </div>
</section>

<section id="login" class="tab">
  <div class="card">
    <h2>ログイン</h2>
    <input id="pw" placeholder="パスワード">
    <br><br>
    <button class="main" onclick="login()">ログイン</button>
  </div>
</section>

<section id="pay" class="tab">
  <div class="card">
    <h2>ヤマPay</h2>
    <p>現在準備中です。公開をお楽しみに！</p>
  </div>
</section>

<section id="setting" class="tab">
  <div class="card">
    <h2>設定</h2>

    <div class="toggle">
      <span>ダークモード</span>
      <button onclick="toggleDark()">切替</button>
    </div>

    <div class="toggle">
      <span>通知</span>
      <button onclick="Notification.requestPermission()">許可</button>
    </div>

    <p>最新バージョン：1.02</p>
  </div>
</section>

<section id="music" class="tab">
  <div class="card">
    <h2>Music</h2>
    <button class="main" onclick="location.href='https://audius.co/yuuuuuuuuuuum'">
      音楽ページへ
    </button>
  </div>
</section>

</main>

<nav id="nav" class="hidden">
  <button onclick="show('home',this)" class="active">ホーム</button>
  <button onclick="show('login',this)">ログイン</button>
  <button onclick="show('pay',this)">ヤマPay</button>
  <button onclick="show('setting',this)">設定</button>
  <button onclick="show('music',this)">Music</button>
</nav>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("nav").classList.remove("hidden");
  document.getElementById("news").innerText=NEWS_TEXT;
  document.getElementById("newsTime").innerText=NEWS_UPDATED;
},1800);

function show(id,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
function toggleDark(){document.body.classList.toggle("dark")}
function login(){
  const p=document.getElementById("pw").value;
  const m={
    kaori:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
    daiki:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
    nanami:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
  };
  if(m[p])location.href=m[p];
  else alert("パスワードが違います");
}
setInterval(()=>{document.getElementById("time").innerText=new Date().toLocaleTimeString()},1000);
</script>

</body>
</html>
