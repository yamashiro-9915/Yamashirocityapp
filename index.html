<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>山城市アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;山城市&quot;,
  &quot;short_name&quot;:&quot;山城市&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#0f172a&quot;,
  &quot;theme_color&quot;:&quot;#0f172a&quot;,
  &quot;icons&quot;:[
    {&quot;src&quot;:&quot;icon-192.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;},
    {&quot;src&quot;:&quot;icon-512.png&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;}
  ]
}">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
/* 完全リセット（白い余白絶対防止） */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#020617;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  overscroll-behavior:none;
}
body{
  padding-bottom:env(safe-area-inset-bottom);
}

/* PCブロック */
@media (min-width: 900px){
  body::before{
    content:"スマートフォン専用アプリです";
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#020617;
    font-size:18px;
    z-index:9999;
  }
}

/* スプラッシュ */
#splash{
  position:fixed;
  inset:0;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:1000;
}
#splash h1{
  font-size:28px;
  background:linear-gradient(120deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;
  color:transparent;
  animation:zoom 2.5s ease forwards;
}
@keyframes zoom{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(2.5);opacity:1}
}

/* ガラスUI */
.glass{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:16px;
  margin:12px;
}

/* 画面 */
.page{display:none;height:calc(100vh - 80px);overflow-y:auto;padding-bottom:40px}
.page.active{display:block}

/* タブ */
#tabs{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:80px;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab{
  flex:1;
  text-align:center;
  font-size:12px;
  padding-top:10px;
  opacity:.6;
}
.tab.active{opacity:1}

/* ボタン */
button,input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:none;
  font-size:16px;
}
button{background:#38bdf8;color:#020617}

/* iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:18px;
}
</style>
</head>

<body>

<!-- 編集しやすいお知らせ -->
<script>
const CITY_NEWS = "市役所窓口は本日17時までです。";
const NEWS_UPDATED = "2026-05-10 17:30";
</script>

<div id="splash"><h1>山城市</h1></div>

<!-- 通知許可 -->
<div id="notify" class="glass" style="display:none">
  <h3>通知を許可しますか？</h3>
  <p>山城市から毎日名言をお届けします</p>
  <button onclick="enableNotify()">許可する</button>
</div>

<!-- ホーム -->
<div id="home" class="page active">
  <div class="glass">
    <h2>山城市へようこそ！</h2>
    <p id="time"></p>
    <hr>
    <p><b>お知らせ</b><br><span id="news"></span></p>
    <small>最終更新：<span id="newsTime"></span></small>
    <br><br>
    <button onclick="location.href='https://sites.google.com/view/yamashiro-city'">
      山城市ホームページへ
    </button>
  </div>
</div>

<!-- ログイン -->
<div id="login" class="page">
  <div class="glass">
    <h2>ログイン</h2>
    <input id="pw" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</div>

<!-- ヤマPay -->
<div id="pay" class="page">
  <div class="glass">
    <h2>ヤマPay</h2>
    <p>現在準備中です。公開をお楽しみに！</p>
  </div>
</div>

<!-- 設定 -->
<div id="setting" class="page">
  <div class="glass">
    <h2>設定</h2>
    <p>ダークモード / 文字サイズ / 通知 / 視覚支援</p>
    <p>最新バージョン：1.02</p>
  </div>
</div>

<!-- music -->
<div id="music" class="page">
  <iframe src="https://audius.co/yuuuuuuuuuuum"></iframe>
</div>

<!-- タブ -->
<div id="tabs">
  <div class="tab active" onclick="openTab('home',this)">ホーム</div>
  <div class="tab" onclick="openTab('login',this)">ログイン</div>
  <div class="tab" onclick="openTab('pay',this)">ヤマPay</div>
  <div class="tab" onclick="openTab('setting',this)">設定</div>
  <div class="tab" onclick="openTab('music',this)">music</div>
</div>

<script>
/* スプラッシュ */
setTimeout(()=>document.getElementById("splash").style.display="none",2600);

/* 時刻 */
setInterval(()=>{
  document.getElementById("time").textContent="現在の時刻："+new Date().toLocaleTimeString();
},1000);

/* お知らせ */
news.textContent=CITY_NEWS;
newsTime.textContent=NEWS_UPDATED;

/* タブ */
function openTab(id,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
}

/* ログイン */
function login(){
  const p=pw.value;
  const map={
    kaori:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
    daiki:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
    nanami:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
  };
  if(map[p])location.href=map[p];
  else alert("パスワードが違います");
}

/* 通知 */
function enableNotify(){
  Notification.requestPermission();
  notify.style.display="none";
}
if(!localStorage.notified){
  notify.style.display="block";
  localStorage.notified=1;
}
</script>

</body>
</html>
