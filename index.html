<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>山城市アプリ β</title>

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;山城市&quot;,
  &quot;short_name&quot;:&quot;山城市&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#000000&quot;,
  &quot;theme_color&quot;:&quot;#0f172a&quot;,
  &quot;icons&quot;:[
    {&quot;src&quot;:&quot;icon-192.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;},
    {&quot;src&quot;:&quot;icon-512.png&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;}
  ]
}">

<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
  --glass: rgba(255,255,255,0.18);
  --blur: blur(18px);
  --text: #fff;
  --bg: #020617;
}
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background:linear-gradient(180deg,#020617,#0f172a);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* 起動画面 */
#splash{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#020617;
  z-index:999;
}
#splash h1{
  font-size:2rem;
  background:linear-gradient(90deg,#38bdf8,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:zoom 1.6s ease forwards;
}
@keyframes zoom{
  from{transform:scale(0.4);opacity:0;}
  to{transform:scale(1.4);opacity:1;}
}

/* インストール案内 */
#installGuide{
  display:none;
  padding:30px;
  text-align:center;
}
#installGuide h2{
  font-size:1.5rem;
  margin-bottom:10px;
}
.guide{
  background:var(--glass);
  backdrop-filter:var(--blur);
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

/* アプリ本体 */
#app{
  display:none;
  height:100%;
  padding-bottom:80px;
}
header{
  padding:20px;
  font-size:1.4rem;
  font-weight:600;
}
.page{
  display:none;
  padding:20px;
}
.page.active{display:block}

/* ガラスカード */
.card{
  background:var(--glass);
  backdrop-filter:var(--blur);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
}

/* タブバー */
#tabs{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:rgba(15,23,42,0.9);
  display:flex;
  justify-content:space-around;
  align-items:center;
}
#tabs button{
  background:none;
  border:none;
  color:#cbd5f5;
  font-size:0.75rem;
}
#tabs button.active{
  color:#38bdf8;
}

/* 設定 */
.toggle{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
input[type=range]{width:100%}

/* PC非対応 */
@media(min-width:768px){
  body::before{
    content:"このアプリはスマートフォン専用です";
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#020617;
    font-size:1.5rem;
    z-index:2000;
  }
}
</style>
</head>

<body>

<div id="splash"><h1>山城市</h1></div>

<div id="installGuide">
  <h2>アプリにしてください</h2>
  <div class="guide" id="iosGuide">
    iPhone：共有ボタン →「ホーム画面に追加」
  </div>
  <div class="guide" id="androidGuide">
    Android：︙メニュー →「アプリをインストール」
  </div>
</div>

<div id="app">
<header id="headerTitle">ホーム</header>

<!-- ホーム -->
<div class="page active" id="home">
  <div class="card">
    <h3>山城市へようこそ！</h3>
    <div id="clock"></div>
  </div>

  <!-- ▼ お知らせ（ここを編集） -->
  <div class="card">
    <h4>山城市からのお知らせ</h4>
    <p id="newsText">現在、市民向けアプリβ版を公開中です。</p>
    <small>最終更新：<span id="newsUpdated">2026/05/10 10:00</span></small>
     <p id="newsText">山城市アプリ・Yamashiro music　の提供スタート！</p>
    <small>最終更新：<span id="newsUpdated">2026/05/10 10:00</span></small>
  </div>

  <div class="card">
    <a href="https://sites.google.com/view/yamashiro-city" target="_blank">山城市ホームページへ</a>
  </div>
</div>

<!-- ログイン -->
<div class="page" id="login">
  <div class="card">
    <input id="pw" placeholder="パスワード" style="width:100%;padding:10px">
    <button onclick="login()" style="margin-top:10px;width:100%">ログイン</button>
  </div>
</div>

<!-- ヤマPay -->
<div class="page" id="pay">
  <div class="card">現在準備中です。公開をお楽しみに！</div>
</div>

<!-- 設定 -->
<div class="page" id="settings">
  <div class="card toggle">
    ダークモード
    <input type="checkbox" onchange="toggleDark(this.checked)">
  </div>

  <div class="card">
    文字サイズ
    <input type="range" min="14" max="22" onchange="document.body.style.fontSize=this.value+'px'">
  </div>

  <div class="card toggle">
    通知
    <input type="checkbox" checked>
  </div>

  <div class="card">
    最新バージョン：1.02
  </div>

  <div class="card">
    視覚障害者向けモード（今後対応）
  </div>
</div>

</div>

<!-- タブ -->
<div id="tabs">
  <button onclick="show('home')" class="active">ホーム</button>
  <button onclick="show('login')">ログイン</button>
  <button onclick="show('pay')">ヤマPay</button>
  <button onclick="show('settings')">設定</button>
  <button onclick="location.href='https://audius.co/yuuuuuuuuuuum'">music</button>
</div>

<script>
const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

setTimeout(()=>{
  document.getElementById('splash').style.display="none";
  if(!standalone){
    document.getElementById('installGuide').style.display="block";
  }else{
    document.getElementById('app').style.display="block";
    requestNotify();
  }
},1600);

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('headerTitle').innerText=event.target.innerText;
}

function login(){
  const pw=document.getElementById('pw').value;
  const map={
    kaori:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
    daiki:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
    nanami:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
  };
  if(map[pw]) location.href=map[pw];
  else alert("パスワードが違います");
}

function toggleDark(on){
  document.body.style.background=on?"#000":"linear-gradient(180deg,#020617,#0f172a)";
}

function requestNotify(){
  if(Notification.permission==="default"){
    Notification.requestPermission();
  }
}

setInterval(()=>{
  document.getElementById('clock').innerText=new Date().toLocaleTimeString();
},1000);
</script>

</body>
</html>
