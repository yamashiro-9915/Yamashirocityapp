<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>山城市</title>

<!-- PWA -->
<link rel="manifest" href="data:application/json,{
  &quot;name&quot;:&quot;山城市&quot;,
  &quot;short_name&quot;:&quot;山城市&quot;,
  &quot;start_url&quot;:&quot;.&quot;,
  &quot;display&quot;:&quot;standalone&quot;,
  &quot;background_color&quot;:&quot;#ffffff&quot;,
  &quot;theme_color&quot;:&quot;#0a84ff&quot;,
  &quot;icons&quot;:[
    {&quot;src&quot;:&quot;icon-192.png&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;},
    {&quot;src&quot;:&quot;icon-512.png&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;}
  ]
}">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
:root{
  --bg:rgba(255,255,255,0.6);
  --text:#000;
  --blur:blur(20px);
}
body.dark{
  --bg:rgba(20,20,20,0.6);
  --text:#fff;
  background:#000;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:linear-gradient(180deg,#e8f0ff,#ffffff);
  color:var(--text);
  -webkit-user-select:none;
}
.glass{
  background:var(--bg);
  backdrop-filter:var(--blur);
  -webkit-backdrop-filter:var(--blur);
  border-radius:20px;
  padding:16px;
}
#splash{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#fff;z-index:999;
}
#splash h1{
  font-size:40px;
  background:linear-gradient(90deg,#0a84ff,#5e5ce6);
  -webkit-background-clip:text;
  color:transparent;
  animation:zoom 1.8s ease forwards;
}
@keyframes zoom{
  from{transform:scale(0.5);opacity:0}
  to{transform:scale(1.8);opacity:1}
}
#install{
  display:none;
  padding:20px;
}
.tab{
  display:none;
}
.tab.active{display:block}
nav{
  position:fixed;
  bottom:0;left:0;right:0;
  display:flex;
  background:var(--bg);
  backdrop-filter:var(--blur);
}
nav button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
  font-size:12px;
}
.hidden-pc{
  display:none;
}
</style>
</head>

<body>

<div id="splash"><h1>山城市</h1></div>

<div id="install" class="glass">
  <h2>📱 アプリにしてください</h2>
  <p id="installText"></p>
</div>

<main id="app" style="display:none;padding:16px 16px 90px">

<!-- 🔔 お知らせ編集エリア -->
<script>
const NEWS_TEXT = "山城市公式アプリ ベータ版を公開しました。";
const NEWS_UPDATED = "2026-05-10 12:00";
</script>

<section id="home" class="tab active">
  <div class="glass">
    <h2>山城市へようこそ！</h2>
    <p id="time"></p>
    <hr>
    <h3>📢 山城市からのお知らせ</h3>
    <p id="news"></p>
    <small>最終更新：<span id="newsTime"></span></small>
    <hr>
    <button onclick="location.href='https://sites.google.com/view/yamashiro-city'">
      山城市ホームページへ
    </button>
  </div>
</section>

<section id="login" class="tab">
  <div class="glass">
    <h2>ログイン</h2>
    <input id="pw" placeholder="パスワード">
    <button onclick="login()">ログイン</button>
  </div>
</section>

<section id="pay" class="tab">
  <div class="glass">
    <h2>ヤマPay</h2>
    <p>現在準備中です。公開をお楽しみに！</p>
  </div>
</section>

<section id="setting" class="tab">
  <div class="glass">
    <h2>設定</h2>
    <button onclick="toggleDark()">ダークモード</button>
    <button onclick="font(1.1)">文字 大</button>
    <button onclick="font(0.9)">文字 小</button>
    <button onclick="Notification.requestPermission()">通知許可</button>
    <p>最新バージョン：1.02</p>
    <p>視覚障害者モード：準備中</p>
  </div>
</section>

<section id="music" class="tab">
  <div class="glass">
    <button onclick="location.href='https://audius.co/yuuuuuuuuuuum'">
      🎵 Musicページへ
    </button>
  </div>
</section>

</main>

<nav id="nav" style="display:none">
  <button onclick="show('home')">🏠</button>
  <button onclick="show('login')">🔑</button>
  <button onclick="show('pay')">💳</button>
  <button onclick="show('setting')">⚙️</button>
  <button onclick="show('music')">🎵</button>
</nav>

<script>
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  if(window.matchMedia("(display-mode: standalone)").matches){
    startApp();
  }else{
    showInstall();
  }
},2000);

function showInstall(){
  document.getElementById("install").style.display="block";
  const ua=navigator.userAgent;
  document.getElementById("installText").innerText=
    ua.includes("iPhone")
    ? "Safariの共有ボタン → ホーム画面に追加"
    : "Chromeの︙ → アプリをインストール";
}

function startApp(){
  document.getElementById("app").style.display="block";
  document.getElementById("nav").style.display="flex";
  document.getElementById("news").innerText=NEWS_TEXT;
  document.getElementById("newsTime").innerText=NEWS_UPDATED;
}

function show(id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  const pw=document.getElementById("pw").value;
  const map={
    kaori:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
    daiki:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
    nanami:"https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
  };
  if(map[pw]) location.href=map[pw];
  else alert("パスワードが違います");
}

function toggleDark(){document.body.classList.toggle("dark")}
function font(s){document.body.style.fontSize=(parseFloat(getComputedStyle(document.body).fontSize)*s)+"px"}

setInterval(()=>{document.getElementById("time").innerText="現在の時刻："+new Date().toLocaleTimeString()},1000);
</script>

</body>
</html>
