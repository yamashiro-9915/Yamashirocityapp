<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- viewport-fit=cover は必須！これで画面の隅々まで描画範囲になります -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>山城市公式アプリ</title>

    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="data:application/manifest+json,{'name':'山城市','short_name':'山城市','display':'standalone','background_color':'#a1c4fd','theme_color':'#a1c4fd','icons':[{'src':'icon-192.png','sizes':'192x192','type':'image/png'}]}">

    <style>
        /* お知らせ管理エリア */
        :root {
            --news-content: "山城市役所：システムアップデート完了。快適な市民ライフを！";
            --last-updated: "2026/05/10 19:00";
            --app-version: "1.02";
            /* 共通背景色（白くならないための保険） */
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        }

        /* 画面全体の完全固定 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* 100dvhで底面まで埋める */
            height: 100dvh;
            overflow: hidden;
            background: var(--bg-gradient) fixed;
            /* 引っ張った時のバウンスで白背景を見せない */
            overscroll-behavior: none;
            -webkit-user-select: none;
        }

        /* アプリ全体のコンテナ */
        .app-shell {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            /* セーフエリア（iPhoneの下の棒部分）のパディング */
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* グラスモーフィズムなカード */
        .glass-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            margin: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* タブバー（ANAアプリのような浮遊感） */
        .tab-bar {
            position: fixed;
            /* 下から少し浮かせつつ、セーフエリア分を確保 */
            bottom: calc(15px + env(safe-area-inset-bottom));
            left: 15px;
            right: 15px;
            height: 75px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 40px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 9999;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #666;
            font-size: 11px;
            font-weight: 500;
        }

        .tab-item.active {
            color: #007aff;
        }

        .tab-icon { font-size: 26px; margin-bottom: 2px; }

        /* コンテンツ表示エリア */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 120px 0; /* 下に余白を作ってタブバーと被らないように */
            -webkit-overflow-scrolling: touch;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* スプラッシュ */
        #splash {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100000;
            transition: 0.8s ease-in-out;
        }
        .splash-text {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #007aff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: grow 1.8s ease-in-out forwards;
        }
        @keyframes grow {
            0% { transform: scale(0.6); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1.2); opacity: 1; filter: blur(0); }
        }

        /* PCアクセス拒否 */
        @media (min-width: 1024px) {
            body::after {
                content: "スマートフォンでアクセスしてください。";
                position: fixed; inset: 0; background: white; z-index: 200000;
                display: flex; justify-content: center; align-items: center;
                font-size: 20px; font-weight: bold;
            }
        }
    </style>
</head>
<body>

<div id="splash"><div class="splash-text">山城市</div></div>

<div class="app-shell">
    <div class="content-scroll">
        <!-- Home -->
        <div id="page-home" class="page active">
            <div class="glass-card">
                <h1 style="margin:0;">山城市へようこそ</h1>
                <p id="clock" style="font-size: 24px; font-weight: 600;"></p>
                <div style="background: rgba(0,122,255,0.1); padding:15px; border-radius:15px;">
                    <small>CITY NEWS</small>
                    <p id="news-body" style="margin:5px 0;"></p>
                    <small id="news-date" style="opacity:0.6;"></small>
                </div>
            </div>
            <div class="glass-card" onclick="location.href='https://sites.google.com/view/yamashiro-city'">
                🏙️ 山城市公式サイトを開く
            </div>
        </div>

        <!-- Login -->
        <div id="page-login" class="page">
            <div class="glass-card">
                <h2>住民認証</h2>
                <input type="password" id="pw" placeholder="パスワードを入力" style="width:100%; padding:15px; border-radius:15px; border:none; background:rgba(255,255,255,0.5); font-size:18px;">
                <button onclick="doLogin()" style="width:100%; margin-top:15px; padding:15px; border-radius:15px; border:none; background:#007aff; color:white; font-weight:bold;">入館する</button>
            </div>
        </div>

        <!-- Pay -->
        <div id="page-pay" class="page">
            <div class="glass-card" style="text-align:center; padding:60px 20px;">
                <span style="font-size:60px;">💳</span>
                <h3>ヤマPay</h3>
                <p>現在準備中です。次回のアップデートをお楽しみに！</p>
            </div>
        </div>

        <!-- Settings -->
        <div id="page-settings" class="page">
            <div class="glass-card">
                <h3>各種設定</h3>
                <p>ダークモード: 未設定</p>
                <p>バージョン: v1.02</p>
                <button onclick="alert('最新です')" style="width:100%; padding:10px; border-radius:10px; border:1px solid #007aff; background:none; color:#007aff;">アップデートを確認</button>
            </div>
        </div>

        <!-- Music -->
        <div id="page-music" class="page">
            <div class="glass-card" style="padding:10px;">
                <iframe src="https://audius.co/yuuuuuuuuuuum" style="width:100%; height:450px; border-radius:15px; border:none;"></iframe>
            </div>
        </div>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
        <div class="tab-item active" onclick="nav('home', this)">
            <span class="tab-icon">🏠</span><span>ホーム</span>
        </div>
        <div class="tab-item" onclick="nav('login', this)">
            <span class="tab-icon">🔑</span><span>ログイン</span>
        </div>
        <div class="tab-item" onclick="nav('pay', this)">
            <span class="tab-icon">💳</span><span>ヤマPay</span>
        </div>
        <div class="tab-item" onclick="nav('settings', this)">
            <span class="tab-icon">⚙️</span><span>設定</span>
        </div>
        <div class="tab-item" onclick="nav('music', this)">
            <span class="tab-icon">🎵</span><span>Music</span>
        </div>
    </nav>
</div>

<script>
    // 起動時の初期化
    window.addEventListener('DOMContentLoaded', () => {
        // お知らせ読み込み
        const root = getComputedStyle(document.documentElement);
        document.getElementById('news-body').innerText = root.getPropertyValue('--news-content').replace(/"/g,'');
        document.getElementById('news-date').innerText = "Update: " + root.getPropertyValue('--last-updated').replace(/"/g,'');

        // スプラッシュ解除
        setTimeout(() => {
            const sp = document.getElementById('splash');
            sp.style.opacity = '0';
            setTimeout(() => sp.remove(), 800);
        }, 2500);

        // 時計
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    });

    // ページ切り替え
    function nav(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        // 切り替え時にトップにスクロール
        document.querySelector('.content-scroll').scrollTop = 0;
    }

    // ログイン
    function doLogin() {
        const pass = document.getElementById('pw').value;
        const base = "https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/";
        if(pass === "kaori" || pass === "daiki" || pass === "nanami") {
            location.href = base + pass;
        } else {
            alert("パスワードが違います");
        }
    }
</script>

</body>
</html>
