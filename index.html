<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- 画面下の白枠を防止する重要設定 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>山城市公式アプリ</title>

    <!-- PWA設定 -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuWxsOWfjuW4guWFrOW8j+OCouODl+ODqiIsCiAgInNob3J0X25hbWUiIjogIuWxsOWfjuW4giIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAiaWNvbnMiOiBbCiAgICB7ICJzcmMiOiAiaWNvbi0xOTIucG5nIiwgInNpemVzIjogIjE5MngxOTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH0sCiAgICB7ICJzcmMiOiAiaWNvbi01MTIucG5nIiwgInNpemVzIjogIjUxMng1MTIiLCAidHlwZSI6ICJpbWFnZS9wbmciIH0KICBdCn0=">

    <style>
        /* --- お知らせ編集エリア --- */
        :root {
            --news-1: "【重要】山城市コンテンツ拡大のお知らせ（アプリ、music、book）";
            --news-2: "【広報】新しい電子図書館サービスが開始されました";
            --last-update: "2026/05/15 20:30";
            --app-version: "1.02";
        }

        /* --- 基本スタイル --- */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* 下の白枠を絶対に出さないための指定 */
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        /* --- スプラッシュ画面 --- */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        .splash-logo {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: grow 2s forwards ease-in-out;
            opacity: 0;
        }

        @keyframes grow {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            50% { opacity: 1; filter: blur(0px); }
            100% { transform: scale(1.5); opacity: 1; }
        }

        /* --- ガラスモーフィズム UI --- */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        .container {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom); /* iOSのセーフエリア対応 */
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-top: calc(40px + env(safe-area-inset-top));
            display: none;
        }

        .content-area.active { display: block; }

        /* --- インストールガイド --- */
        #install-guide {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 8000;
            display: none;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        /* --- タブバー (ANA風フローティング) --- */
        .tab-bar-container {
            padding: 0 20px 20px 20px;
            position: fixed;
            bottom: env(safe-area-inset-bottom);
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .tab-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .tab-item {
            flex: 1;
            text-align: center;
            font-size: 10px;
            color: #666;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-item.active {
            color: #007AFF;
            transform: translateY(-5px);
        }

        .tab-icon {
            font-size: 24px;
            display: block;
            margin-bottom: 4px;
        }

        /* --- 各ページ要素 --- */
        .card { padding: 20px; margin-bottom: 20px; }
        h1 { margin-top: 0; font-weight: 800; }
        
        iframe {
            width: 100%;
            height: 70vh;
            border: none;
            border-radius: 20px;
            background: white;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #007AFF;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .dark-mode {
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            color: #eee;
        }

        .dark-mode .glass { background: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

    <!-- スプラッシュ画面 -->
    <div id="splash-screen">
        <div class="splash-logo">山城市</div>
    </div>

    <!-- インストール誘導 -->
    <div id="install-guide">
        <h2 style="margin-top:20vh">山城市アプリへようこそ</h2>
        <p id="guide-text">ブラウザのメニューから「ホーム画面に追加」を選択して、アプリとしてお楽しみください。</p>
        <div style="font-size: 50px; margin-top: 20px;">↓</div>
    </div>

    <div class="container" id="main-app">
        
        <!-- HOME -->
        <div id="home" class="content-area active">
            <h1>山城市へようこそ！</h1>
            <div class="glass card">
                <div id="clock" style="font-size: 1.2rem; font-weight: bold;"></div>
            </div>

            <h3>山城市からのお知らせ</h3>
            <div class="glass card">
                <ul id="news-list" style="padding-left: 20px; line-height: 1.8;"></ul>
                <p style="font-size: 0.8rem; opacity: 0.7;">最終更新: <span id="last-update-text"></span></p>
            </div>

            <button onclick="location.href='https://sites.google.com/view/yamashiro-city'">山城市ホームページへ</button>
        </div>

        <!-- LOGIN -->
        <div id="login" class="content-area">
            <h1>ログイン</h1>
            <div class="glass card">
                <p>パスワードを入力してください</p>
                <input type="password" id="pass-input" placeholder="Password...">
                <button onclick="checkPassword()">ログイン</button>
            </div>
        </div>

        <!-- BOOK -->
        <div id="book" class="content-area">
            <h1>Book</h1>
            <iframe src="https://read.bookcreator.com/library/-OsfDigEB0B_HWB5Y4gf"></iframe>
        </div>

        <!-- MUSIC -->
        <div id="music" class="content-area">
            <h1>Music</h1>
            <iframe src="https://audius.co/yuuuuuuuuuuum"></iframe>
        </div>

        <!-- SETTINGS -->
        <div id="settings" class="content-area">
            <h1>設定</h1>
            <div class="glass card">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span>ダークモード</span>
                    <input type="checkbox" onchange="toggleDarkMode()">
                </div>
                <hr>
                <div style="margin-bottom: 20px;">
                    <span>文字サイズ</span>
                    <select onchange="changeFontSize(this.value)">
                        <option value="16px">標準</option>
                        <option value="20px">大きく</option>
                        <option value="24px">特大</option>
                    </select>
                </div>
                <hr>
                <p>通知設定: <span id="notif-status">未許可</span></p>
                <button onclick="requestNotif()">通知を許可する</button>
                <hr>
                <p>バージョン: <span id="ver-text"></span> (最新)</p>
                <button onclick="alert('最新バージョンです')">アップデートを確認</button>
            </div>
        </div>

        <!-- タブバー -->
        <div class="tab-bar-container">
            <div class="tab-bar glass">
                <div class="tab-item active" onclick="showTab('home')">
                    <span class="tab-icon">🏠</span>ホーム
                </div>
                <div class="tab-item" onclick="showTab('login')">
                    <span class="tab-icon">🔑</span>ログイン
                </div>
                <div class="tab-item" onclick="showTab('settings')">
                    <span class="tab-icon">⚙️</span>設定
                </div>
                <div class="tab-item" onclick="showTab('book')">
                    <span class="tab-icon">📖</span>Book
                </div>
                <div class="tab-item" onclick="showTab('music')">
                    <span class="tab-icon">🎵</span>Music
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. スプラッシュ画面の制御
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    checkFirstLaunch();
                }, 800);
            }, 2500);
        });

        // 2. PWA/ブラウザ判定 (iPad対応)
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile && !isStandalone) {
            document.getElementById('install-guide').style.display = 'block';
            const guideText = document.getElementById('guide-text');
            if (/iPad|iPhone|iPod/.test(navigator.userAgent)) {
                guideText.innerText = "Safariの「共有」ボタンから「ホーム画面に追加」を選択してください。";
            } else {
                guideText.innerText = "ブラウザのメニューから「アプリをインストール」または「ホーム画面に追加」を選択してください。";
            }
        }

        // 3. お知らせデータの反映
        const rootStyles = getComputedStyle(document.documentElement);
        document.getElementById('news-list').innerHTML = `<li>${rootStyles.getPropertyValue('--news-1').replace(/"/g,'')}</li><li>${rootStyles.getPropertyValue('--news-2').replace(/"/g,'')}</li>`;
        document.getElementById('last-update-text').innerText = rootStyles.getPropertyValue('--last-update').replace(/"/g,'');
        document.getElementById('ver-text').innerText = rootStyles.getPropertyValue('--app-version').replace(/"/g,'');

        // 4. 時計機能
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleString('ja-JP');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 5. タブ切り替え
        function showTab(tabId) {
            document.querySelectorAll('.content-area').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // 6. ログインチェック
        function checkPassword() {
            const pass = document.getElementById('pass-input').value;
            const routes = {
                "kaori": "https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/kaori",
                "daiki": "https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/daiki",
                "nanami": "https://sites.google.com/view/yamashiro-city/%E4%BA%BA%E5%88%A5/nanami"
            };
            if (routes[pass]) {
                location.href = routes[pass];
            } else {
                alert("パスワードが正しくありません");
            }
        }

        // 7. 通知シミュレーション
        const quotes = ["今日も素晴らしい一日になりますように。", "一歩ずつ、着実に。", "あなたの笑顔が山城市を明るくします。", "休息も大切な仕事です。"];
        
        function requestNotif() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        document.getElementById('notif-status').innerText = "許可済み";
                        alert("通知を許可しました。毎日ランダムな時間に名言をお届けします。");
                        scheduleFakeNotification();
                    }
                });
            } else {
                alert("この端末は通知に非対応です。ブラウザ設定を確認してください。");
            }
        }

        function scheduleFakeNotification() {
            // PWAの仕様上、バックグラウンドでの完全ランダム通知はサーバーが必要ですが、
            // アプリ起動時に「予約」するシミュレーションを行います。
            console.log("Notification Scheduled");
        }

        function checkFirstLaunch() {
            if (!localStorage.getItem('launched')) {
                if (confirm("通知を許可しますか？（山城市の名言を毎日お届けします）")) {
                    requestNotif();
                }
                localStorage.setItem('launched', 'true');
            }
        }

        // 8. 設定項目
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function changeFontSize(size) {
            document.body.style.fontSize = size;
        }
    </script>
</body>
</html>
